<!-- Dashboard/Home page - displays user stats and quick access -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeLang</title>
    <!-- Bootstrap for responsive layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom styles -->
    <link href="styles.css" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
</head>
<!-- d-flex: flexbox layout, flex-column: stack vertically, min-vh-100: full viewport height -->

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-light bg-light px-3">
        <a class="navbar-brand me-3" href="index.html"><img src="assets/icons/vibelang_transparent_1024.png"
                alt="VibeLang" class="navbar-logo"><span class="vibelang-title">VibeLang</span></a>
        <a class="nav-link mx-2" href="index.html">Dashboard</a>
        <a class="nav-link mx-2" href="courses.html">Courses</a>
        <a class="nav-link mx-2" href="leaderboard.html">Leaderboard</a>
        <span class="ms-auto me-2">Sugubete Andrei | sugubete.andrei@email.com</span>
        <a class="nav-link ms-2" href="profile.html">Profile</a>
    </nav>
    <main class="container my-4">
        <h1 class="h4">Welcome back, Andrei!</h1>
        <!-- row: grid container, col: auto-sized equal width columns, mt-4: top margin -->
        <div class="row mt-4">
            <!-- Stats card -->
            <div class="col">
                <!-- card: content container, shadow-sm: subtle shadow, text-center: centered text -->
                <div class="card text-center shadow-sm">
                    <div class="card-body">12 days</div>
                </div>
            </div>
            <!-- Stats card -->
            <div class="col">
                <div class="card text-center shadow-sm">
                    <div class="card-body">2450 XP</div>
                </div>
            </div>
            <!-- Button to resume last lesson -->
            <div class="col">
                <!-- w-100: full width, rounded-pill: rounded button -->
                <a href="lesson.html" class="btn btn-primary rounded-pill w-100">Continue last lesson</a>
            </div>
        </div>
    </main>
    <!-- mt-auto: push footer to bottom of page -->
    <footer class="bg-light text-center py-2 mt-auto">
        © 2026 VibeLang
    </footer>
</body>

</html>
